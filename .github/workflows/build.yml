name: Build TritonBots-2027 STM32 Firmware

on:
  push:
  pull_request:

jobs:
  build:

    name: Build STM32 Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi
      
      - name: Check tools
        run: |
          cmake --version
          ninja --version
          arm-none-eabi-gcc --version
          ls -la Embedded/STM32H723ZG_nucleo/cmake

      - name: Debug repository contents
        run: |
          echo "=== pwd ===" && pwd
          echo "=== git status ===" && git status --porcelain=v1 -b || true
          echo "=== git ref ===" && (git rev-parse HEAD && git log -1 --oneline) || true
          echo "=== ls workspace root ===" && ls -la
          echo "=== ls Embedded ===" && ls -la Embedded || true
          echo "=== ls Embedded/STM32H723ZG_nucleo ===" && ls -la Embedded/STM32H723ZG_nucleo || true
          echo "=== ls toolchain dir ===" && ls -la Embedded/STM32H723ZG_nucleo/cmake || true
          test -f "Embedded/STM32H723ZG_nucleo/cmake/gcc-arm-none-eabi.cmake" && echo "Toolchain exists" || (echo "Toolchain missing"; exit 1)
          echo "=== git ls-files (toolchain) ===" && git ls-files Embedded/STM32H723ZG_nucleo/cmake/gcc-arm-none-eabi.cmake || true


      - name: Configure CMake
        run: |
          TOOLCHAIN_FILE="$PWD/Embedded/STM32H723ZG_nucleo/cmake/gcc-arm-none-eabi.cmake"
          echo "Using TOOLCHAIN_FILE=$TOOLCHAIN_FILE"
          test -f "$TOOLCHAIN_FILE" && echo "Toolchain file present" || (echo "Toolchain file missing" && ls -la "$PWD/Embedded/STM32H723ZG_nucleo/cmake" && exit 1)

          cmake \
            -S Embedded/STM32H723ZG_nucleo \
            -B Embedded/STM32H723ZG_nucleo/build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE"


      - name: Build firmware
        run: |
          cmake --build Embedded/STM32H723ZG_nucleo/build --parallel

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: STM32 firmware artifacts
          path: |
            Embedded/STM32H723ZG_nucleo/build/**/*.elf
            Embedded/STM32H723ZG_nucleo/build/**/*.hex
            Embedded/STM32H723ZG_nucleo/build/**/*.bin
            Embedded/STM32H723ZG_nucleo/build/**/*.map

