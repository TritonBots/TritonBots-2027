name: Documentation Checks

on:
  push:
  pull_request:

jobs:
  docs:
    name: Lint/Spellcheck + Doc Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Spellcheck (codespell)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install codespell
        run: |
          python -m pip install --upgrade pip
          pip install codespell

      - name: Run codespell
        # Uses a conservative configuration and skips large/binary-ish docs.
        run: |
          codespell \
            --skip="Embedded/**/*.pdf,Embedded/**/*.svg,**/*.png,**/*.jpg,**/*.jpeg,**/*.gif,**/*.webp" \
            --ignore-words-list="teh" \
            -q 2 || exit 0

      - name: Doc coverage + Doxygen/param checks (python)
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          ROOT = Path('.')

          TARGET_DIRS = [
            ROOT / 'Embedded' / 'TritonBots-2027' / 'Core' / 'Inc',
            ROOT / 'Embedded' / 'TritonBots-2027' / 'Core' / 'Src',
          ]

          # Exempt files inside Embedded/TritonBots-2027/Core/{Inc,Src}.
          # These are typically generated/vendor STM32/FreeRTOS sources.
          EXEMPT_PATHS = {
            # Inc
            'Embedded/TritonBots-2027/Core/Inc/FreeRTOSConfig.h',
            'Embedded/TritonBots-2027/Core/Inc/stm32f1xx_hal_conf.h',
            'Embedded/TritonBots-2027/Core/Inc/stm32f1xx_it.h',

            # Src
            'Embedded/TritonBots-2027/Core/Src/freertos.c',
            'Embedded/TritonBots-2027/Core/Src/stm32f1xx_hal_msp.c',
            'Embedded/TritonBots-2027/Core/Src/stm32f1xx_hal_timebase_tim.c',
            'Embedded/TritonBots-2027/Core/Src/stm32f1xx_it.c',
            'Embedded/TritonBots-2027/Core/Src/syscalls.c',
            'Embedded/TritonBots-2027/Core/Src/sysmem.c',
            'Embedded/TritonBots-2027/Core/Src/system_stm32f1xx.c',

            # Exempted because you only want to enforce doc coverage via the .h file.
            'Embedded/TritonBots-2027/Core/Src/moteus_protocol.c',
          }

          # Enforce doc coverage for specific files.
          # In particular, moteus_protocol.c is exempted; coverage is enforced via moteus_protocol.h.
          ENFORCE_PATHS = {
            'Embedded/TritonBots-2027/Core/Inc/moteus_protocol.h',
          }

          def norm(p: Path) -> str:
            return str(p).replace('\\', '/')

          def iter_target_files():
            for d in TARGET_DIRS:
              if not d.exists():
                continue
              for p in d.rglob('*'):
                if p.suffix.lower() not in {'.h', '.hpp', '.c', '.cc', '.cpp'}:
                  continue
                np = norm(p)
                if np in EXEMPT_PATHS:
                  continue
                yield p

          # Heuristic parser:
          # - Find function-like declarations/definitions.
          # - Require a Doxygen-style comment block immediately preceding the function.
          # - The comment must contain at least @brief and @param tags for each parameter.

          func_line_re = re.compile(
            r'''(?x)
            ^\s*
            (?:[A-Za-z_][\w\s\*]*\s+)?   # return type
            [A-Za-z_]\w*\s*\(\s*([^\)]*)\s*\)\s*(;|\{)\s*$
            '''
          )

          # Split comma-separated parameters (basic, not perfect for function pointers)
          def extract_params(param_blob: str):
            blob = param_blob.strip()
            if blob in {'', 'void'}:
              return []

            parts = []
            depth = 0
            cur = ''
            for ch in blob:
              if ch == '<':
                depth += 1
              elif ch == '>':
                depth = max(0, depth - 1)
              if ch == ',' and depth == 0:
                parts.append(cur)
                cur = ''
              else:
                cur += ch
            parts.append(cur)

            params = []
            for part in parts:
              part = part.strip()
              if not part:
                continue
              part = part.split('=')[0].strip()  # strip defaults
              part = re.sub(r'\[\s*\w*\s*\]$', '', part)  # strip arrays

              tokens = re.split(r'\s+', part)
              if len(tokens) >= 2:
                name = tokens[-1].lstrip('*&')
                params.append(name)

            return [p for p in params if p]

          issues = []

          for fp in iter_target_files():
            np = norm(fp)
            text = fp.read_text(encoding='utf-8', errors='ignore')
            lines = text.splitlines()

            for i, line in enumerate(lines):
              m = func_line_re.match(line)
              if not m:
                continue

              param_blob = m.group(1)
              params = extract_params(param_blob)

              # Doxygen block immediately above (allow blank lines)
              j = i - 1
              while j >= 0 and lines[j].strip() == '':
                j -= 1

              if j < 0:
                issues.append(f"{fp}:{i+1}: Missing doxygen comment for function")
                continue

              # Collect /** ... */
              if '/**' not in lines[j]:
                # If the closing */ is on same line, heuristics may fail, but keep simple.
                # If there's no */ nearby, fail.
                if '*/' not in lines[j]:
                  issues.append(f"{fp}:{i+1}: Expected /** ... */ directly above function")
                  continue

              # Walk backwards to find '/**'
              end = j
              start = None
              k = j
              while k >= 0:
                if '/**' in lines[k]:
                  start = k
                  break
                k -= 1

              if start is None:
                issues.append(f"{fp}:{i+1}: Expected /** ... */ directly above function (no start found)")
                continue

              block_text = '\n'.join(lines[start:end+1])
              if '/**' not in block_text or '*/' not in block_text:
                issues.append(f"{fp}:{i+1}: Expected complete /** ... */ block for function")
                continue

              # Validate @brief
              if '@brief' not in block_text:
                issues.append(f"{fp}:{i+1}: Doxygen block missing @brief")

              # Validate @param for each param
              missing_params = []
              for p in params:
                if not re.search(r'@param\s+' + re.escape(p) + r'\b', block_text):
                  missing_params.append(p)
              if missing_params:
                issues.append(f"{fp}:{i+1}: Doxygen block missing @param for: {', '.join(missing_params)}")

          # If we want to be extra sure the enforced files are covered,
          # ensure they are actually part of the check.
          checked_files = set()
          for fp in iter_target_files():
            checked_files.add(norm(fp))
          for ep in ENFORCE_PATHS:
            if ep not in checked_files:
              issues.append(f"Missing enforced file from scan: {ep}")

          if issues:
            print("Doc coverage issues found (WARNING mode):")
            for it in issues[:200]:
              print(it)
            if len(issues) > 200:
              print(f"... and {len(issues)-200} more")
          else:
            print("Doc coverage checks passed (no issues found).")

          # Always return success because workflow should only warn.
          PY

